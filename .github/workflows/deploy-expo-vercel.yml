# Deploy em produção na Vercel: app Expo (React Native Web) em mobile/ — o mesmo que no Expo.
# GitHub → Settings → Secrets and variables → Actions:
#   VERCEL_TOKEN      (Vercel → Settings → Tokens)
#   VERCEL_ORG_ID     (mobile/.vercel/project.json após vercel link na pasta mobile/)
#   VERCEL_PROJECT_ID (idem, projectId)

name: Deploy Expo web (Vercel)

on:
  push:
    branches: [main, master]
    paths:
      - "mobile/**"
      - ".github/workflows/deploy-expo-vercel.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: mobile
          vercel-args: "--prod"
